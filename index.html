<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="美食日記" />
  <title>美食日記</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root {
      --coral: #D85A30;
      --coral-light: #FAECE7;
      --coral-dark: #712B13;
      --amber: #EF9F27;
      --amber-light: #FAEEDA;
      --green-light: #EAF3DE;
      --green-dark: #27500A;
      --red-light: #FCEBEB;
      --red-dark: #791F1F;
      --pink-light: #FBEAF0;
      --pink-dark: #72243E;
      --text: #1a1a18;
      --text-2: #5F5E5A;
      --text-3: #888780;
      --bg: #ffffff;
      --bg-2: #F7F6F2;
      --bg-3: #F1EFE8;
      --border: rgba(0,0,0,0.12);
      --border-2: rgba(0,0,0,0.22);
      --radius: 12px;
      --radius-sm: 8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, 'Helvetica Neue', sans-serif; background: var(--bg-2); color: var(--text); min-height: 100vh; }

    /* header */
    .header { background: var(--bg); border-bottom: 0.5px solid var(--border); padding: 0 16px; position: sticky; top: 0; z-index: 100; }
    .header-inner { max-width: 640px; margin: 0 auto; height: 56px; display: flex; align-items: center; justify-content: space-between; }
    .header h1 { font-size: 18px; font-weight: 600; color: var(--coral); letter-spacing: -0.3px; }
    .header-actions { display: flex; gap: 8px; }

    /* tabs */
    .tabs { background: var(--bg); border-bottom: 0.5px solid var(--border); position: sticky; top: 56px; z-index: 99; }
    .tabs-inner { max-width: 640px; margin: 0 auto; display: flex; }
    .tab { flex: 1; padding: 12px 0; font-size: 14px; text-align: center; color: var(--text-3); cursor: pointer; border-bottom: 2px solid transparent; transition: all .15s; font-weight: 500; }
    .tab.active { color: var(--coral); border-bottom-color: var(--coral); }

    /* content */
    .content { max-width: 640px; margin: 0 auto; padding: 16px; }

    /* stats */
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 16px; }
    .stat { background: var(--bg); border-radius: var(--radius-sm); padding: 12px; text-align: center; border: 0.5px solid var(--border); }
    .stat-num { font-size: 24px; font-weight: 600; color: var(--text); }
    .stat-label { font-size: 11px; color: var(--text-3); margin-top: 2px; }

    /* form card */
    .form-card { background: var(--bg); border-radius: var(--radius); border: 0.5px solid var(--border); padding: 16px; margin-bottom: 16px; }
    .form-card h2 { font-size: 15px; font-weight: 600; margin-bottom: 14px; color: var(--text); }
    .field { margin-bottom: 12px; }
    .field label { font-size: 12px; color: var(--text-2); display: block; margin-bottom: 4px; font-weight: 500; }
    .field input, .field select, .field textarea {
      width: 100%; font-size: 15px; padding: 10px 12px;
      border: 0.5px solid var(--border-2); border-radius: var(--radius-sm);
      background: var(--bg-2); color: var(--text);
      font-family: inherit; -webkit-appearance: none; appearance: none;
    }
    .field textarea { resize: vertical; min-height: 72px; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

    /* star rating */
    .stars { display: flex; gap: 6px; margin-top: 4px; }
    .star { font-size: 28px; cursor: pointer; color: var(--bg-3); transition: color .1s; user-select: none; line-height: 1; }
    .star.on { color: var(--amber); }

    /* checkboxes */
    .check-group { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 4px; }
    .check-item { display: flex; align-items: center; gap: 6px; font-size: 14px; color: var(--text); cursor: pointer; }
    .check-item input { width: 18px; height: 18px; cursor: pointer; accent-color: var(--coral); }

    /* buttons */
    .btn { padding: 10px 20px; border-radius: var(--radius-sm); font-size: 15px; font-family: inherit; font-weight: 500; cursor: pointer; border: 0.5px solid var(--border-2); background: var(--bg); color: var(--text); transition: all .12s; }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--coral); color: #fff; border-color: transparent; }
    .btn-primary:hover { background: var(--coral-dark); }
    .btn-sm { padding: 6px 12px; font-size: 13px; }
    .btn-row { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }

    /* filter pills */
    .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; overflow-x: auto; padding-bottom: 2px; }
    .pill { padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 500; cursor: pointer; border: 0.5px solid var(--border-2); background: var(--bg); color: var(--text-2); white-space: nowrap; transition: all .12s; }
    .pill.active { background: var(--coral); color: #fff; border-color: transparent; }

    /* restaurant cards */
    .r-card { background: var(--bg); border-radius: var(--radius); border: 0.5px solid var(--border); padding: 14px 16px; margin-bottom: 10px; }
    .r-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
    .r-name { font-size: 16px; font-weight: 600; color: var(--text); }
    .r-meta { font-size: 12px; color: var(--text-3); margin-top: 2px; }
    .r-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
    .tag { font-size: 11px; padding: 3px 8px; border-radius: 20px; border: 0.5px solid var(--border); color: var(--text-2); }
    .badge { font-size: 11px; padding: 3px 9px; border-radius: 20px; font-weight: 600; cursor: pointer; transition: opacity .1s; }
    .badge:active { opacity: 0.7; }
    .badge-ok { background: var(--green-light); color: var(--green-dark); }
    .badge-todo { background: var(--red-light); color: var(--red-dark); }
    .badge-revisit { background: var(--pink-light); color: var(--pink-dark); }
    .r-todo { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
    .r-note { font-size: 13px; color: var(--text-2); line-height: 1.6; margin-bottom: 10px; background: var(--bg-2); border-radius: var(--radius-sm); padding: 8px 10px; }
    .r-footer { display: flex; align-items: center; justify-content: space-between; }
    .r-stars { display: flex; gap: 2px; }
    .r-star { font-size: 15px; color: var(--amber); }
    .r-star.off { color: var(--bg-3); }
    .r-actions { display: flex; gap: 4px; align-items: center; }
    .icon-btn { background: none; border: none; cursor: pointer; font-size: 18px; padding: 6px; border-radius: var(--radius-sm); color: var(--text-3); }
    .icon-btn:hover { background: var(--bg-2); color: var(--text); }
    .maps-link { font-size: 12px; color: var(--coral); text-decoration: none; font-weight: 500; display: flex; align-items: center; gap: 3px; }
    .empty { text-align: center; padding: 48px 16px; color: var(--text-3); font-size: 15px; }
    .empty-icon { font-size: 40px; margin-bottom: 10px; }
    .alert { background: var(--amber-light); border-radius: var(--radius-sm); padding: 10px 14px; font-size: 13px; color: #633806; margin-bottom: 12px; font-weight: 500; }

    /* modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; display: flex; align-items: flex-end; justify-content: center; }
    .modal { background: var(--bg); border-radius: 20px 20px 0 0; width: 100%; max-width: 640px; padding: 20px 20px 32px; max-height: 90vh; overflow-y: auto; }
    .modal h2 { font-size: 17px; font-weight: 600; margin-bottom: 16px; }
    .modal-close { float: right; background: var(--bg-2); border: none; border-radius: 50%; width: 28px; height: 28px; font-size: 16px; cursor: pointer; color: var(--text-2); }

    /* connecting state */
    .loading { text-align: center; padding: 48px; color: var(--text-3); }
    .spinner { width: 32px; height: 32px; border: 3px solid var(--bg-3); border-top-color: var(--coral); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* config screen */
    .config-screen { max-width: 480px; margin: 40px auto; background: var(--bg); border-radius: var(--radius); border: 0.5px solid var(--border); padding: 28px; }
    .config-screen h2 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
    .config-screen p { font-size: 14px; color: var(--text-2); line-height: 1.6; margin-bottom: 16px; }
    .config-screen .step { display: flex; gap: 10px; margin-bottom: 10px; font-size: 14px; }
    .step-num { width: 22px; height: 22px; background: var(--coral); color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; flex-shrink: 0; margin-top: 1px; }
    code { background: var(--bg-2); padding: 2px 6px; border-radius: 4px; font-size: 13px; font-family: monospace; }

    @media (max-width: 480px) {
      .stats { grid-template-columns: repeat(2, 1fr); }
      .row3 { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<div id="app">
  <div class="loading"><div class="spinner"></div>載入中...</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

let db = null;
let restaurants = [];
let currentFilter = 'all';
let currentRating = 0;
let editingId = null;

const FIREBASE_CONFIG = {
  apiKey: "AIzaSyBlw3gGqB6F3rD9cyjKKNTNfaTBrChkg_U",
  authDomain: "food-map-2026.firebaseapp.com",
  databaseURL: "https://food-map-2026-default-rtdb.firebaseio.com",
  projectId: "food-map-2026",
  storageBucket: "food-map-2026.firebasestorage.app",
  messagingSenderId: "589127514473",
  appId: "1:589127514473:web:8a0b73e0ec2d497ef3a5f8",
};

const CLOUDINARY_CLOUD = 'dbpkleehp';
const CLOUDINARY_PRESET = 'a1oasxno';

async function uploadPhoto(file) {
  const fd = new FormData();
  fd.append('file', file);
  fd.append('upload_preset', CLOUDINARY_PRESET);
  const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/image/upload`, { method:'POST', body:fd });
  const data = await res.json();
  return data.secure_url;
}

async function initFirebase() {
  const app = initializeApp(FIREBASE_CONFIG);
  db = getDatabase(app);
  listenToData();
  listenToPocket();
}

function listenToData() {
  const restaurantsRef = ref(db, 'restaurants');
  onValue(restaurantsRef, snap => {
    restaurants = [];
    const val = snap.val();
    if (val) {
      Object.entries(val).forEach(([id, data]) => restaurants.push({ id, ...data }));
      restaurants.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
    }
    renderApp();
  });
}

async function addRestaurant(data) {
  await push(ref(db, 'restaurants'), data);
}
async function updateRestaurant(id, data) {
  await update(ref(db, `restaurants/${id}`), data);
}
async function deleteRestaurant(id) {
  await remove(ref(db, `restaurants/${id}`));
}

function renderApp() {
  const app = document.getElementById('app');
  if (!db) return;
  app.innerHTML = `
    <div class="header">
      <div class="header-inner">
        <h1 id="app-title" onclick="window.openIconPicker()" style="cursor:pointer" title="點我換icon">${currentIcon} 美食日記</h1>
        <div class="header-actions">
          <button class="btn btn-sm" onclick="window.showAddModal()">＋ 新增</button>
        </div>
      </div>
    </div>
    <div class="tabs">
      <div class="tabs-inner">
        <div class="tab active" id="tab-list" onclick="window.switchTab('list')">📋 清單</div>
        <div class="tab" id="tab-add" onclick="window.switchTab('add')">＋ 新增</div>
        <div class="tab" id="tab-stats" onclick="window.switchTab('stats')">📊 統計</div>
        <div class="tab" id="tab-pocket" onclick="window.switchTab('pocket')">🔖 口袋</div>
        <div class="tab" id="tab-map" onclick="window.switchTab('map')">🗺️ 地圖</div>
      </div>
    </div>
    <div class="content" id="main-content"></div>
    <div id="modal-container"></div>
  `;
  window.switchTab('list');
}

function renderConfig() {
  document.getElementById('app').innerHTML = `
    <div class="content">
      <div class="config-screen">
        <h2>🍜 美食日記</h2>
        <p>請先輸入你的 Firebase 設定，讓大家可以共用同一份清單。</p>
        <div class="step"><div class="step-num">1</div><div>前往 <a href="https://console.firebase.google.com" target="_blank" style="color:var(--coral)">console.firebase.google.com</a>，建立新專案</div></div>
        <div class="step"><div class="step-num">2</div><div>在專案中建立 <strong>Realtime Database</strong>，規則設為測試模式</div></div>
        <div class="step"><div class="step-num">3</div><div>到「專案設定 > 一般」，新增 Web App，複製 firebaseConfig 的內容</div></div>
        <div class="step"><div class="step-num">4</div><div>把以下欄位貼入</div></div>
        <div class="field" style="margin-top:16px"><label>apiKey</label><input id="cfg-apiKey" placeholder="AIza..." /></div>
        <div class="field"><label>authDomain</label><input id="cfg-authDomain" placeholder="your-app.firebaseapp.com" /></div>
        <div class="field"><label>databaseURL</label><input id="cfg-databaseURL" placeholder="https://your-app-default-rtdb.firebaseio.com" /></div>
        <div class="field"><label>projectId</label><input id="cfg-projectId" placeholder="your-app" /></div>
        <div class="field"><label>storageBucket</label><input id="cfg-storageBucket" placeholder="your-app.appspot.com" /></div>
        <div class="field"><label>messagingSenderId</label><input id="cfg-messagingSenderId" placeholder="123456789" /></div>
        <div class="field"><label>appId</label><input id="cfg-appId" placeholder="1:123:web:abc..." /></div>
        <div class="btn-row">
          <button class="btn btn-primary" onclick="window.saveFirebaseConfig()">連線並開始使用</button>
        </div>
        <p style="font-size:12px;color:var(--text-3);margin-top:12px">設定只存在你的裝置上，朋友也需要輸入一次同樣的設定。</p>
      </div>
    </div>`;
}



window.switchTab = function(tab) {
  ['list','add','stats','pocket','map'].forEach(t => {
    const el = document.getElementById('tab-'+t);
    if (el) el.classList.toggle('active', t === tab);
  });
  const content = document.getElementById('main-content');
  if (tab === 'list') renderList(content);
  if (tab === 'add') renderAddForm(content);
  if (tab === 'stats') renderStats(content);
  if (tab === 'pocket') renderPocket(content);
  if (tab === 'map') renderMap(content);
};

window.showAddModal = function() {
  window.switchTab('add');
};

function renderStats(container) {
  const total = restaurants.length;
  const noReview = restaurants.filter(r => !r.review).length;
  const noPhoto = restaurants.filter(r => !r.photo).length;
  const revisit = restaurants.filter(r => r.revisit).length;
  const avgRating = total ? (restaurants.filter(r=>r.rating>0).reduce((s,r)=>s+r.rating,0) / (restaurants.filter(r=>r.rating>0).length||1)).toFixed(1) : '-';
  const types = {};
  restaurants.forEach(r => { if (r.type) types[r.type] = (types[r.type]||0)+1; });
  const topType = Object.entries(types).sort((a,b)=>b[1]-a[1])[0];
  container.innerHTML = `
    <div class="stats" style="grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px">
      <div class="stat" style="cursor:pointer" onclick="window.switchTab('list');window.setFilter('all')"><div class="stat-num">${total}</div><div class="stat-label">總共吃了幾家 →</div></div>
      <div class="stat" style="cursor:pointer" onclick="window.switchTab('list');window.setFilter('no-review')"><div class="stat-num" style="color:${noReview>0?'#A32D2D':'inherit'}">${noReview}</div><div class="stat-label">待寫評論 →</div></div>
      <div class="stat" style="cursor:pointer" onclick="window.switchTab('list');window.setFilter('no-photo')"><div class="stat-num" style="color:${noPhoto>0?'#854F0B':'inherit'}">${noPhoto}</div><div class="stat-label">待補照片 →</div></div>
      <div class="stat" style="cursor:pointer" onclick="window.switchTab('list');window.setFilter('revisit')"><div class="stat-num">${revisit}</div><div class="stat-label">想再訪 →</div></div>
      <div class="stat"><div class="stat-num">${avgRating}</div><div class="stat-label">平均評分</div></div>
      <div class="stat"><div class="stat-num" style="font-size:16px">${topType ? topType[0] : '-'}</div><div class="stat-label">最愛料理類型</div></div>
    </div>
    <div class="form-card">
      <h2>各類型分佈</h2>
      ${Object.entries(types).sort((a,b)=>b[1]-a[1]).map(([t,c])=>`
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
          <span style="font-size:13px;width:80px;color:var(--text-2);flex-shrink:0">${t}</span>
          <div style="flex:1;background:var(--bg-3);border-radius:4px;height:8px">
            <div style="background:var(--coral);width:${Math.round(c/total*100)}%;height:100%;border-radius:4px"></div>
          </div>
          <span style="font-size:13px;color:var(--text-3);width:28px;text-align:right">${c}</span>
        </div>
      `).join('')}
    </div>
  `;
}

function renderList(container) {
  const searchVal = (window._searchVal || '').toLowerCase();
  let filtered = restaurants;
  if (currentFilter === 'no-review') filtered = restaurants.filter(r => !r.review);
  if (currentFilter === 'no-photo') filtered = restaurants.filter(r => !r.photo);
  if (currentFilter === 'revisit') filtered = restaurants.filter(r => r.revisit);
  if (searchVal) filtered = filtered.filter(r =>
    (r.name||'').toLowerCase().includes(searchVal) ||
    (r.area||'').toLowerCase().includes(searchVal) ||
    (r.type||'').toLowerCase().includes(searchVal) ||
    (r.note||'').toLowerCase().includes(searchVal)
  );

  const pending = restaurants.filter(r => !r.review || !r.photo).length;

  // Group by month
  const groups = {};
  filtered.forEach(r => {
    const key = r.date ? r.date.slice(0,7) : '未知';
    if (!groups[key]) groups[key] = [];
    groups[key].push(r);
  });
  const sortedMonths = Object.keys(groups).sort((a,b) => b.localeCompare(a));
  if (!window._openMonths) window._openMonths = new Set([sortedMonths[0]]);

  container.innerHTML = `
    <div class="stats">
      <div class="stat" style="cursor:pointer" onclick="window.switchTab('list');window.setFilter('all')"><div class="stat-num">${restaurants.length}</div><div class="stat-label">吃過</div></div>
      <div class="stat" style="cursor:pointer" onclick="window.setFilter('no-review')"><div class="stat-num" style="color:${restaurants.filter(r=>!r.review).length>0?'#A32D2D':'inherit'}">${restaurants.filter(r=>!r.review).length}</div><div class="stat-label">待評論</div></div>
      <div class="stat" style="cursor:pointer" onclick="window.setFilter('no-photo')"><div class="stat-num" style="color:${restaurants.filter(r=>!r.photo).length>0?'#854F0B':'inherit'}">${restaurants.filter(r=>!r.photo).length}</div><div class="stat-label">待拍照</div></div>
      <div class="stat" style="cursor:pointer" onclick="window.setFilter('revisit')"><div class="stat-num">${restaurants.filter(r=>r.revisit).length}</div><div class="stat-label">想再訪</div></div>
    </div>
    ${pending > 0 ? `<div class="alert">⏰ 還有 ${pending} 家等你記錄評論或照片！</div>` : ''}
    <div style="position:relative;margin-bottom:10px">
      <input id="search-input" value="${window._searchVal||''}" oninput="window.onSearch(this.value)" placeholder="🔍 搜尋餐廳名稱、地區、類型..." style="width:100%;font-size:15px;padding:10px 12px 10px 36px;border:0.5px solid var(--border-2);border-radius:var(--radius-sm);background:var(--bg-2);color:var(--text);font-family:inherit" />
      <span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none">🔍</span>
      ${searchVal ? `<button onclick="window.onSearch('')" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;color:var(--text-3)">✕</button>` : ''}
    </div>
    <div class="filters">
      <div class="pill ${currentFilter==='all'?'active':''}" onclick="window.setFilter('all')">全部 (${restaurants.length})</div>
      <div class="pill ${currentFilter==='no-review'?'active':''}" onclick="window.setFilter('no-review')">✍️ 待評論 (${restaurants.filter(r=>!r.review).length})</div>
      <div class="pill ${currentFilter==='no-photo'?'active':''}" onclick="window.setFilter('no-photo')">📸 待拍照 (${restaurants.filter(r=>!r.photo).length})</div>
      <div class="pill ${currentFilter==='revisit'?'active':''}" onclick="window.setFilter('revisit')">❤️ 想再訪 (${restaurants.filter(r=>r.revisit).length})</div>
    </div>
    ${filtered.length === 0
      ? `<div class="empty"><div class="empty-icon">🍽️</div>${searchVal ? '找不到符合的餐廳' : restaurants.length === 0 ? '快去吃頓好的，然後記下來！' : '沒有符合條件的餐廳'}</div>`
      : sortedMonths.map(month => {
          const isOpen = window._openMonths.has(month);
          const label = month === '未知' ? '未知日期' : month.replace('-', '年') + '月';
          return `
            <div style="margin-bottom:4px">

window.toggleMonth = function(month) {

};

window.toggleCheck = function(field) {

window.addEmoji = function(text) {
  const ta = document.getElementById('f-note');
  const pos = ta.selectionStart;
  const before = ta.value.substring(0, pos);
  const after = ta.value.substring(pos);
  ta.value = before + text + after;
  ta.focus();
  ta.selectionStart = ta.selectionEnd = pos + text.length;
};

window.submitForm = async function() {
  const name = document.getElementById('f-name')?.value.trim();
  const date = document.getElementById('f-date')?.value;
  if (!name) { alert('請輸入餐廳名稱'); return; }
  if (!date) { alert('請選擇日期'); return; }
  const submitBtn = document.querySelector('[onclick="window.submitForm()"]');
  if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = '儲存中...'; }
  const newPhotos = await uploadPhotos(selectedPhotos);
  const data = {
    name, date,
    addedBy: document.getElementById('f-who')?.value.trim() || '',
    area: document.getElementById('f-area')?.value.trim() || '',
    type: document.getElementById('f-type')?.value || '',
    price: document.getElementById('f-price')?.value || '',
    rating: currentRating,
    photo: document.getElementById('f-photo')?.value === '1',
    review: document.getElementById('f-review')?.value === '1',
    revisit: document.getElementById('f-revisit')?.value === '1',
    note: document.getElementById('f-note')?.value.trim() || '',
  };
  if (editingRestaurantId) {
    const existing = restaurants.find(x => x.id === editingRestaurantId);
    data.photos = [...(existing?.photos || []), ...newPhotos];
    data.createdAt = existing?.createdAt || Date.now();
    await updateRestaurant(editingRestaurantId, data);
    editingRestaurantId = null;
  } else {
    data.photos = newPhotos;
    data.createdAt = Date.now();
    await addRestaurant(data);
  }
  selectedPhotos = [];
  ['photo','review','revisit'].forEach(f => { const b=document.getElementById('btn-'+f); if(b){b.style.background='var(--bg)';b.style.color='var(--text)';b.style.borderColor='var(--border-2)';} const i=document.getElementById('f-'+f); if(i)i.value='0'; });
  window.switchTab('list');
};

let selectedPhotos = [];

window.previewPhotos = function(input) {
  const files = Array.from(input.files).slice(0, 3);
  selectedPhotos = files;
  const preview = document.getElementById('photo-preview');
  const status = document.getElementById('photo-status');
  if (!preview) return;
  preview.innerHTML = files.map((f,i) => {
    const url = URL.createObjectURL(f);
    return `<div style="position:relative;width:72px;height:72px">
      <img src="${url}" style="width:72px;height:72px;object-fit:cover;border-radius:8px;border:0.5px solid var(--border)" />
      <button onclick="window.removePhoto(${i})" style="position:absolute;top:-6px;right:-6px;background:var(--coral);color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0">✕</button>
    </div>`;
  }).join('');
  status.textContent = files.length > 0 ? `已選 ${files.length} 張` : '';
};

window.removePhoto = function(idx) {
  selectedPhotos.splice(idx, 1);
  const dt = new DataTransfer();
  selectedPhotos.forEach(f => dt.items.add(f));
  const input = document.getElementById('f-photos');
  if (input) input.files = dt.files;
  window.previewPhotos({ files: dt.files });
};

async function uploadPhotos(files) {
  if (!files || files.length === 0) return [];
  const status = document.getElementById('photo-status');
  const urls = [];
  for (let i = 0; i < files.length; i++) {
    if (status) status.textContent = `上傳中 ${i+1}/${files.length}...`;
    try { urls.push(await uploadPhoto(files[i])); } catch(e) { console.error('Upload failed', e); }
  }
  if (status) status.textContent = `✅ 上傳完成`;
  return urls;
}

  window.scrollTo(0,0);
  document.getElementById('p-name').value = p.name || '';
  document.getElementById('p-type').value = p.type || '';
  document.getElementById('p-area').value = p.area || '';
  document.getElementById('p-address').value = p.address || '';
  document.getElementById('p-url').value = p.url || '';
  document.getElementById('p-note').value = p.note || '';
  // Change button to save mode
  const btn = document.querySelector('[onclick="window.addPocket()"]');
  if (btn) {
    btn.textContent = '💾 儲存修改';
    btn.onclick = async () => {
      await updatePocketItem(id, {
        name: document.getElementById('p-name').value.trim(),
        type: document.getElementById('p-type').value,
        area: document.getElementById('p-area').value.trim(),
        address: document.getElementById('p-address').value.trim(),
        url: document.getElementById('p-url').value.trim(),
        note: document.getElementById('p-note').value.trim(),
        lat: null, lng: null, // reset coords so map re-geocodes
      });
      btn.textContent = '加入口袋清單';
      btn.onclick = window.addPocket;
      ['p-name','p-type','p-area','p-address','p-url','p-note'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = '';
      });
    };
  }
  // Scroll to top of form
  document.querySelector('.form-card')?.scrollIntoView({ behavior: 'smooth' });
};

window.addPocket = async function() {
  const name = document.getElementById('p-name')?.value.trim();
  if (!name) { alert('請輸入餐廳名稱'); return; }
  await addPocketItem({
    name,
    type: document.getElementById('p-type')?.value || '',
    area: document.getElementById('p-area')?.value.trim() || '',
    address: document.getElementById('p-address')?.value.trim() || '',
    url: document.getElementById('p-url')?.value.trim() || '',
    note: document.getElementById('p-note')?.value.trim() || '',
    createdAt: Date.now(),
  });
};

window.deletePocket = async function(id) {
  if (confirm('確定移除？')) await deletePocketItem(id);
};

window.pocketToVisited = async function(id) {
  const p = pocketList.find(x => x.id === id);
  if (!p) return;
  await deletePocketItem(id);
  await addRestaurant({
    name: p.name, type: p.type || '', area: p.area || '',
    date: new Date().toISOString().slice(0,10),
    addedBy: '', price: '', rating: 0,
    photo: false, review: false, revisit: false,
    note: p.note || '', createdAt: Date.now(),
  });
  window.switchTab('add');
  alert('已移到吃過清單！記得補上評分和心得 😋');
};

// ── MAP ──
let mapInstance = null;

async function geocodeAddress(address) {
  try {
    const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}&limit=1&countrycodes=tw`);
    const data = await res.json();
    if (data && data[0]) return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
  } catch(e) {}
  return null;
}

function extractCoordsFromUrl(url) {
  if (!url) return null;
  // @lat,lng,zoom or ?q=lat,lng
  let m = url.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/);
  if (m) return { lat: parseFloat(m[1]), lng: parseFloat(m[2]) };
  m = url.match(/[?&]q=(-?\d+\.\d+),(-?\d+\.\d+)/);
  if (m) return { lat: parseFloat(m[1]), lng: parseFloat(m[2]) };
  return null;
}

async function getCoords(r) {
  if (r.lat && r.lng) return { lat: r.lat, lng: r.lng };
  if (r.url) {
    // Try to resolve short URLs by fetching
    const c = extractCoordsFromUrl(r.url);
    if (c) return c;
  }
  // Use address field if available, else name + area
  const addr = r.address
    ? r.address + ' 台灣'
    : [r.name, r.area || '台北', '台灣'].filter(Boolean).join(' ');
  return await geocodeAddress(addr);
}

function renderMap(container) {
  container.innerHTML = `
    <div style="margin-bottom:10px;display:flex;gap:8px;flex-wrap:wrap;align-items:center">
      <span style="font-size:13px;font-weight:600;color:var(--text)">顯示：</span>
      <label style="display:flex;align-items:center;gap:4px;font-size:13px;cursor:pointer"><input type="checkbox" id="map-show-visited" checked onchange="window.refreshMapMarkers()" /> 🟢 吃過</label>
      <label style="display:flex;align-items:center;gap:4px;font-size:13px;cursor:pointer"><input type="checkbox" id="map-show-bad" checked onchange="window.refreshMapMarkers()" /> 🔴 踩雷</label>
      <label style="display:flex;align-items:center;gap:4px;font-size:13px;cursor:pointer"><input type="checkbox" id="map-show-pocket" checked onchange="window.refreshMapMarkers()" /> 🔵 待吃</label>
    </div>
    <div id="map-container" style="width:100%;height:65vh;border-radius:var(--radius);overflow:hidden;border:0.5px solid var(--border)"></div>
    <div id="map-loading" style="text-align:center;padding:12px;font-size:13px;color:var(--text-3)"></div>
  `;
  setTimeout(() => initMap(), 100);
}

async function initMap() {
  const el = document.getElementById('map-container');
  if (!el) return;
  if (mapInstance) { mapInstance.remove(); mapInstance = null; }
  mapInstance = L.map('map-container').setView([25.05, 121.53], 12);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors', maxZoom: 19
  }).addTo(mapInstance);
  window.refreshMapMarkers();
}

window.mapMarkers = [];

window.refreshMapMarkers = async function() {
  if (!mapInstance) return;
  window.mapMarkers.forEach(m => m.remove());
  window.mapMarkers = [];

  const showVisited = document.getElementById('map-show-visited')?.checked;
  const showBad = document.getElementById('map-show-bad')?.checked;
  const showPocket = document.getElementById('map-show-pocket')?.checked;
  const loading = document.getElementById('map-loading');

  const items = [];
  if (showVisited || showBad) {
    restaurants.forEach(r => {
      const isBad = r.rating > 0 && r.rating <= 2;
      if (isBad && showBad) items.push({ ...r, _type: 'bad' });
      else if (!isBad && showVisited) items.push({ ...r, _type: 'visited' });
    });
  }
  if (showPocket) pocketList.forEach(p => items.push({ ...p, _type: 'pocket' }));

  if (loading) loading.textContent = items.length > 0 ? `載入 ${items.length} 個地點中...` : '';

  let done = 0;
  const bounds = [];
  for (const item of items) {
    const coords = await getCoords(item);
    if (!coords) { done++; if (loading) loading.textContent = `找不到「${item.name}」的座標，請補上地址或 Maps 連結`; continue; }
    await updateRestaurantCoords(item.id, coords, item._type);
    const color = item._type === 'bad' ? '#D83030' : item._type === 'pocket' ? '#3B82F6' : '#16A34A';
    const emoji = item._type === 'bad' ? '💀' : item._type === 'pocket' ? '🔖' : '✅';
    const icon = L.divIcon({
      html: `<div style="background:${color};color:#fff;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 2px 6px rgba(0,0,0,0.3);border:2px solid #fff">${emoji}</div>`,
      iconSize: [32,32], iconAnchor: [16,16], className: ''
    });
    const popup = `<div style="font-size:13px;min-width:120px">
      <div style="font-weight:600;margin-bottom:4px">${esc(item.name)}</div>
      ${item.date ? `<div style="color:#666">${item.date}</div>` : ''}
      ${item.type ? `<div style="color:#666">${item.type}</div>` : ''}
      ${item.rating > 0 ? `<div>${'★'.repeat(item.rating)}${'☆'.repeat(5-item.rating)}</div>` : ''}
      ${item.note ? `<div style="margin-top:4px;color:#444">${esc(item.note).slice(0,60)}</div>` : ''}
    </div>`;
    const marker = L.marker([coords.lat, coords.lng], { icon }).bindPopup(popup).addTo(mapInstance);
    window.mapMarkers.push(marker);
    bounds.push([coords.lat, coords.lng]);
    done++;
    if (loading) loading.textContent = `載入中 ${done}/${items.length}...`;
  }
  if (bounds.length > 0) mapInstance.fitBounds(bounds, { padding: [30,30], maxZoom: 15 });
  if (loading) loading.textContent = bounds.length > 0 ? `顯示 ${bounds.length} 個地點` : '沒有可顯示的地點（請確認餐廳有填地址或 Maps 連結）';
};

async function updateRestaurantCoords(id, coords, type) {
  if (type === 'pocket') {
    const p = pocketList.find(x => x.id === id);
    if (p && !p.lat) await updatePocketItem(id, { lat: coords.lat, lng: coords.lng });
  } else {
    const r = restaurants.find(x => x.id === id);
    if (r && !r.lat) await updateRestaurant(id, { lat: coords.lat, lng: coords.lng });
  }
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

initFirebase();
</script>
